<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kash — Login</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="alternate icon" type="image/png" href="/static/favicon.png">
  <link rel="apple-touch-icon" href="/static/favicon.png">
  <style>
    :root {
      --primary: #0a2540;
      --secondary: #0d3d52;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0a2540 0%, #0d3d52 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'DM Sans', 'Segoe UI', Roboto, sans-serif;
    }

    .login-card {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 24px;
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo h1 {
      font-size: 1.8rem;
      font-weight: 800;
      color: white;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
    }

    .logo p {
      color: rgba(255, 255, 255, 0.8);
      margin-top: 0.25rem;
      font-size: 0.9rem;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      color: rgba(255, 255, 255, 0.9);
      font-weight: 600;
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
    }

    input {
      width: 100%;
      padding: 0.85rem 1rem;
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 12px;
      color: white;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.6);
    }

    input:focus {
      border-color: rgba(255, 255, 255, 0.7);
      background: rgba(255, 255, 255, 0.25);
    }

    .btn-login {
      width: 100%;
      padding: 0.9rem;
      background: white;
      color: var(--primary);
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
    }

    .error-msg {
      background: rgba(239, 68, 68, 0.3);
      border: 1px solid rgba(239, 68, 68, 0.5);
      color: white;
      padding: 0.75rem 1rem;
      border-radius: 10px;
      margin-bottom: 1rem;
      font-size: 0.9rem;
      display: none;
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
  <div class="login-card">
    <div class="logo">
      <h1><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 88 26" height="32"
          style="vertical-align:middle;display:inline-block"><text y="21" font-family="DM Sans,sans-serif"
            font-weight="800" font-size="23" fill="none" stroke="#00d4aa" stroke-width="1.3">K</text><text x="16" y="21"
            font-family="DM Sans,sans-serif" font-weight="800" font-size="23" fill="#ffffff">ash</text></svg></h1>
      <p>Private. Simple. Yours.</p>
    </div>
    <div class="error-msg" id="error-msg"></div>
    <div class="form-group" id="user-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="Enter username" autocomplete="username">
    </div>
    <div class="form-group" id="pass-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
    </div>
    <div class="form-group" id="2fa-group" style="display:none;">
      <label id="2fa-label">Verification Code</label>
      <input type="text" id="2fa-code" placeholder="Enter 6-digit code" autocomplete="one-time-code">
    </div>
    <button class="btn-login" onclick="doLogin()">Sign In</button>

    <div style="margin: 1.5rem 0; text-align: center; color: rgba(255,255,255,0.6); position: relative;">
      <span
        style="background: rgba(13, 61, 82, 0.4); border-radius: 4px; padding: 0 10px; position: relative; z-index: 1;">or</span>
      <div
        style="position: absolute; top: 50%; left: 0; right: 0; border-top: 1px solid rgba(255,255,255,0.2); z-index: 0;">
      </div>
    </div>

    <button class="btn-login"
      style="background: white; color: #444; display: flex; align-items: center; justify-content: center; gap: 10px;"
      onclick="window.location.href='/login/google'">
      <svg width="18" height="18" viewBox="0 0 24 24">
        <path fill="#4285F4"
          d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
        <path fill="#34A853"
          d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
        <path fill="#FBBC05"
          d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
        <path fill="#EA4335"
          d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
      </svg>
      Sign in with Google
    </button>
  </div>
  <script>
    document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

    // Check for errors from OAuth redirect
    const urlParams = new URLSearchParams(window.location.search);
    const errorParam = urlParams.get('error');
    if (errorParam === 'not_found') {
      const errDiv = document.getElementById('error-msg');
      errDiv.textContent = 'Account not found. Please contact your administrator to create an account first.';
      errDiv.style.display = 'block';
    }

    let pending2FAMethod = null;
    let pendingUsername = null;

    async function doLogin() {
      const errDiv = document.getElementById('error-msg');
      errDiv.style.display = 'none';

      let bodyData = {};
      if (pending2FAMethod) {
        const code = document.getElementById('2fa-code').value.trim();
        if (!code) {
          errDiv.textContent = 'Please enter verification code';
          errDiv.style.display = 'block';
          return;
        }
        bodyData = { username: pendingUsername, code: code };
      } else {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        if (!username || !password) {
          errDiv.textContent = 'Please enter username and password';
          errDiv.style.display = 'block';
          return;
        }
        bodyData = { username, password };
      }

      const resp = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(bodyData)
      });
      const data = await resp.json();

      if (resp.ok && data.success) {
        window.location.href = '/';
      } else if (resp.ok && data.status === '2fa_required') {
        pending2FAMethod = data.method;
        pendingUsername = data.username;
        document.getElementById('user-group').style.display = 'none';
        document.getElementById('pass-group').style.display = 'none';
        document.getElementById('2fa-group').style.display = 'block';

        const label = document.getElementById('2fa-label');
        if (data.method === 'email') label.textContent = 'Email Code Sent';
        else label.textContent = 'Authenticator Code';

        document.getElementById('2fa-code').focus();
      } else {
        errDiv.textContent = data.error || 'Login failed';
        errDiv.style.display = 'block';
      }
    }
  </script>
</body>

</html>
