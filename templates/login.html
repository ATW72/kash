<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kash — Login</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<link rel="alternate icon" type="image/png" href="/static/favicon.png">
<link rel="apple-touch-icon" href="/static/favicon.png">
<style>
  :root {
    --primary: #667eea;
    --secondary: #764ba2;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  .login-card {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 24px;
    padding: 3rem 2.5rem;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .logo {
    text-align: center;
    margin-bottom: 2rem;
  }
  .logo h1 {
    font-size: 1.8rem;
    font-weight: 800;
    color: white;
    text-shadow: 0 2px 10px rgba(0,0,0,0.2);
  }
  .logo p {
    color: rgba(255,255,255,0.8);
    margin-top: 0.25rem;
    font-size: 0.9rem;
  }
  .form-group {
    margin-bottom: 1.25rem;
  }
  label {
    display: block;
    color: rgba(255,255,255,0.9);
    font-weight: 600;
    margin-bottom: 0.5rem;
    font-size: 0.9rem;
  }
  input {
    width: 100%;
    padding: 0.85rem 1rem;
    background: rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 12px;
    color: white;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }
  input::placeholder { color: rgba(255,255,255,0.6); }
  input:focus {
    border-color: rgba(255,255,255,0.7);
    background: rgba(255,255,255,0.25);
  }
  .btn-login {
    width: 100%;
    padding: 0.9rem;
    background: white;
    color: var(--primary);
    border: none;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    margin-top: 0.5rem;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  }
  .btn-login:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.3);
  }
  .error-msg {
    background: rgba(239,68,68,0.3);
    border: 1px solid rgba(239,68,68,0.5);
    color: white;
    padding: 0.75rem 1rem;
    border-radius: 10px;
    margin-bottom: 1rem;
    font-size: 0.9rem;
    display: none;
  }
</style>
</head>
<body>
<div class="login-card">
  <div class="logo">
    <h1>💸 Kash</h1>
    <p>Anthony Family Finance</p>
  </div>
  <div class="error-msg" id="error-msg"></div>
  <div class="form-group">
    <label>Username</label>
    <input type="text" id="username" placeholder="Enter username" autocomplete="username">
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
  </div>
  <button class="btn-login" onclick="doLogin()">Sign In</button>
</div>
<script>
  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  async function doLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const errDiv = document.getElementById('error-msg');
    errDiv.style.display = 'none';
    if (!username || !password) {
      errDiv.textContent = 'Please enter username and password';
      errDiv.style.display = 'block';
      return;
    }
    const resp = await fetch('/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({username, password})
    });
    const data = await resp.json();
    if (resp.ok) {
      window.location.href = '/';
    } else {
      errDiv.textContent = data.error || 'Login failed';
      errDiv.style.display = 'block';
    }
  }
</script>
</body>
</html>
