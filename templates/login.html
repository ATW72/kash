<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kash — Login</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="alternate icon" type="image/png" href="/static/favicon.png">
  <link rel="apple-touch-icon" href="/static/favicon.png">
  <style>
    :root {
      --primary: #0a2540;
      --secondary: #0d3d52;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0a2540 0%, #0d3d52 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'DM Sans', 'Segoe UI', Roboto, sans-serif;
    }

    .login-card {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 24px;
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo h1 {
      font-size: 1.8rem;
      font-weight: 800;
      color: white;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
    }

    .logo p {
      color: rgba(255, 255, 255, 0.8);
      margin-top: 0.25rem;
      font-size: 0.9rem;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      color: rgba(255, 255, 255, 0.9);
      font-weight: 600;
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
    }

    input {
      width: 100%;
      padding: 0.85rem 1rem;
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 12px;
      color: white;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.6);
    }

    input:focus {
      border-color: rgba(255, 255, 255, 0.7);
      background: rgba(255, 255, 255, 0.25);
    }

    .btn-login {
      width: 100%;
      padding: 0.9rem;
      background: white;
      color: var(--primary);
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
    }

    .error-msg {
      background: rgba(239, 68, 68, 0.3);
      border: 1px solid rgba(239, 68, 68, 0.5);
      color: white;
      padding: 0.75rem 1rem;
      border-radius: 10px;
      margin-bottom: 1rem;
      font-size: 0.9rem;
      display: none;
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
  <div class="login-card">
    <div class="logo">
      <h1><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 88 26" height="32"
          style="vertical-align:middle;display:inline-block"><text y="21" font-family="DM Sans,sans-serif"
            font-weight="800" font-size="23" fill="none" stroke="#00d4aa" stroke-width="1.3">K</text><text x="16" y="21"
            font-family="DM Sans,sans-serif" font-weight="800" font-size="23" fill="#ffffff">ash</text></svg></h1>
      <p>Private. Simple. Yours.</p>
    </div>
    <div class="error-msg" id="error-msg"></div>
    <div class="form-group" id="user-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="Enter username" autocomplete="username">
    </div>
    <div class="form-group" id="pass-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
    </div>
    <div class="form-group" id="2fa-group" style="display:none;">
      <label id="2fa-label">Verification Code</label>
      <input type="text" id="2fa-code" placeholder="Enter 6-digit code" autocomplete="one-time-code">
    </div>
    <button class="btn-login" onclick="doLogin()">Sign In</button>
  </div>
  <script>
    document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

    let pending2FAMethod = null;
    let pendingUsername = null;

    async function doLogin() {
      const errDiv = document.getElementById('error-msg');
      errDiv.style.display = 'none';

      let bodyData = {};
      if (pending2FAMethod) {
        const code = document.getElementById('2fa-code').value.trim();
        if (!code) {
          errDiv.textContent = 'Please enter verification code';
          errDiv.style.display = 'block';
          return;
        }
        bodyData = { username: pendingUsername, code: code };
      } else {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        if (!username || !password) {
          errDiv.textContent = 'Please enter username and password';
          errDiv.style.display = 'block';
          return;
        }
        bodyData = { username, password };
      }

      const resp = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(bodyData)
      });
      const data = await resp.json();

      if (resp.ok && data.success) {
        window.location.href = '/';
      } else if (resp.ok && data.status === '2fa_required') {
        pending2FAMethod = data.method;
        pendingUsername = data.username;
        document.getElementById('user-group').style.display = 'none';
        document.getElementById('pass-group').style.display = 'none';
        document.getElementById('2fa-group').style.display = 'block';

        const label = document.getElementById('2fa-label');
        if (data.method === 'email') label.textContent = 'Email Code Sent';
        else label.textContent = 'Authenticator Code';

        document.getElementById('2fa-code').focus();
      } else {
        errDiv.textContent = data.error || 'Login failed';
        errDiv.style.display = 'block';
      }
    }
  </script>
</body>

</html>
