<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#071c2e"/>
      <stop offset="100%" stop-color="#0d3d52"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Badge background -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bg)"/>
  <!-- Subtle teal border -->
  <rect width="64" height="64" rx="14" ry="14" fill="none" stroke="#00d4aa" stroke-width="1.5" opacity="0.4"/>
  <!-- Outlined K — geometric, same style as wordmark -->
  <g filter="url(#glow)">
    <!-- Vertical stem -->
    <line x1="16" y1="14" x2="16" y2="50" stroke="#00d4aa" stroke-width="5" stroke-linecap="round"/>
    <!-- Upper arm -->
    <line x1="16" y1="32" x2="46" y2="14" stroke="#00d4aa" stroke-width="4.5" stroke-linecap="round"/>
    <!-- Lower arm -->
    <line x1="16" y1="32" x2="48" y2="50" stroke="#00d4aa" stroke-width="4.5" stroke-linecap="round"/>
  </g>
  <!-- Teal accent dot — bottom right -->
  <circle cx="52" cy="52" r="6" fill="#00d4aa" opacity="0.2"/>
  <circle cx="52" cy="52" r="3" fill="#00d4aa" opacity="0.7"/>
</svg>
