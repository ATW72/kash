<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <clipPath id="clip">
      <rect width="64" height="64" rx="14" ry="14"/>
    </clipPath>
  </defs>
  <rect width="64" height="64" rx="14" ry="14" fill="url(#g)"/>
  <!-- K letter -->
  <g clip-path="url(#clip)" fill="white">
    <rect x="14" y="14" width="7" height="36" rx="2"/>
    <polygon points="21,30 38,14 47,14 30,31 47,50 38,50"/>
  </g>
  <!-- Dollar indicator dot -->
  <circle cx="48" cy="18" r="9" fill="#10b981"/>
  <text x="48" y="22" font-family="Arial,sans-serif" font-size="11" font-weight="900" 
        fill="white" text-anchor="middle">$</text>
